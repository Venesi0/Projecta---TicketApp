<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./../styles.css" />
    <title>Forgot Password</title>
    <link
      rel="icon"
      type="image/x-icon"
      sizes="32x32"
      href="./../img/planet_logo_32x32.png"
    />
    <style>
      body {
        min-height: 100vh;
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fa, #e4ebf5);
        background-image: url("./../img/bg_login.jpg");
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <form action="./reset-password.html" id="loginForm">
      <img src="./../img/logo_projecta.png" alt="logo de TicketFlow" />
      <h1>Enter your email to receive a code</h1>

      <label for="usernameInput">Email :</label>
      <input
        type="email"
        name="username"
        id="usernameInput"
        placeholder="john@gmail.com"
        required
      />

      <button>Send code</button>

      <div class="code-inputs">
        <label for="code1">Enter code :</label>
        <div class="code-group">
          <input
            type="text"
            id="code1"
            name="code1"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
          <input
            type="text"
            id="code2"
            name="code2"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
          <input
            type="text"
            id="code3"
            name="code3"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
          <input
            type="text"
            id="code4"
            name="code4"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
          <input
            type="text"
            id="code5"
            name="code5"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
          <input
            type="text"
            id="code6"
            name="code6"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]"
            required
          />
        </div>
      </div>
      <button type="submit">Reset Password</button>
    </form>
  </body>
</html>
