<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./../styles.css" />
    <title>SignUp Page</title>
    <link
      rel="icon"
      type="image/x-icon"
      sizes="32x32"
      href="./../img/planet_logo_32x32.png"
    />
    <style>
      body {
        min-height: 100vh;
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fa, #e4ebf5);
        background-image: url("./../img/bg_login.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <form action="./logpage.html" id="signUpForm">
      <div id="leftSignUp">
        <img src="./../img/logo_projecta.png" alt="logo de TicketFlow" />
        <h1><span>Sign Up</span> to create your account</h1>
      </div>

      <div class="vertical-divider"></div>

      <div id="rightSignUp">
        <label for="usernameInput">Email :</label>
        <input
          type="email"
          name="username"
          id="usernameInput"
          placeholder="Enter your email"
          required
        />

        <label for="passwordInput">Password :</label>
        <input
          type="password"
          name="password"
          id="passwordInput"
          placeholder="Enter your password"
          required
          minlength="6"
        />

        <label for="passwordInput">Confirm Password :</label>
        <input
          type="password"
          name="confirmPassword"
          id="confirmPasswordInput"
          placeholder="Confirm your password"
          required
          minlength="6"
        />

        <button type="submit">SignUp</button>
      </div>
    </form>
  </body>
</html>
