<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./../styles.css" />
    <title>Login Page</title>
    <link
      rel="icon"
      type="image/x-icon"
      sizes="32x32"
      href="./../img/planet_logo_32x32.png"
    />
    <style>
      body {
        min-height: 100vh;
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fa, #e4ebf5);
        background-image: url("./../img/bg_login.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <form action="./../admin/dashboard.html" id="loginForm">
      <!-- <form action="./../user/user-projects.html" id="loginForm"> -->
      <img src="./../img/logo_projecta.png" alt="logo de TicketFlow" />
      <h1>
        <span>Log in</span> or
        <span><a href="./signup.html">Sign Up</a></span> to create your account
      </h1>

      <div class="role">
        <label for="roleSelect" id="roleLabel">I am :</label>
        <select name="role" id="roleSelect">
          <option value="user">a user</option>
          <option value="admin">an admin</option>
        </select>
      </div>

      <label for="usernameInput">Email :</label>
      <input
        type="email"
        name="username"
        id="usernameInput"
        placeholder="Enter your email"
        required
      />

      <label for="passwordInput">Password :</label>
      <input
        type="password"
        name="password"
        id="passwordInput"
        placeholder="Enter your password"
        required
        minlength="6"
      />

      <button type="submit">Connect</button>
      <div id="forgotPasswd">
        <a href="./forgot-password.html" class="linkPassword"
          >forgot password ?</a
        >
      </div>
    </form>
  </body>
</html>
